aid: consul
name: HashiCorp Consul
url: https://raw.githubusercontent.com/api-evangelist/consul/refs/heads/main/apis.yml
description: >-
  HashiCorp Consul is a distributed, highly available service-networking
  control plane that automates network configuration, discovers services,
  enables secure service-to-service communication, and exposes a strongly
  consistent key/value store. The Consul HTTP API is a REST + JSON service
  exposed by every Consul agent and server at /v1, gated by the
  X-Consul-Token header (apiKey) and ACL policies, supporting blocking
  queries via X-Consul-Index for streaming-style change detection.
type: Index

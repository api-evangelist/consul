created: '2024-01-01'
modified: '2026-04-29'
position: Provider
specificationVersion: '0.19'
x-type: opensource
apis:
  - aid: consul:http-api
    name: Consul HTTP API
    description: >-
      The main HTTP API for interacting with Consul agents and servers.
      Endpoints are grouped under /agent (local agent state and
      registration), /catalog (cluster-wide service and node catalog),
      /health (health-checked service queries), /kv (key/value store),
      /acl (token, policy, and role management), /connect (service
      mesh CA, intentions), /config (central configuration entries),
      /event (user events), /session (locks and leadership), and
      /operator (Raft, autopilot, license).
    image: https://www.consul.io/img/logo-hashicorp.svg
    humanURL: https://developer.hashicorp.com/consul/api-docs
    baseURL: http://localhost:8500/v1
    tags:
      - ACL
      - Catalog
      - Connect
      - Health
      - Key/Value
      - Service Discovery
      - Service Mesh
